<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Roach Family</title>

    <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="background"></div>

<main class="container">
    <header>
        <h1>Roach Family Network</h1>
        <p>Your self-hosted services hub</p>
    </header>

    <section class="grid">

        <a href="https://media.roachfamily.net" class="card">
            <div class="icon">🎬</div>
            <h2>Media</h2>
            <p>Jellyfin</p>
        </a>

        <a href="https://photos.roachfamily.net" class="card">
            <div class="icon">📸</div>
            <h2>Photos</h2>
            <p>Immich</p>
        </a>

        <a href="https://notes.roachfamily.net" class="card">
            <div class="icon">📝</div>
            <h2>Notes</h2>
            <p>Trilium</p>
        </a>

        <a href="https://meals.roachfamily.net" class="card">
            <div class="icon">🍽️</div>
            <h2>Meals</h2>
            <p>Mealie</p>
        </a>

        <a href="https://ai.roachfamily.net" class="card">
            <div class="icon">🤖</div>
            <h2>AI</h2>
            <p>Ollama</p>
        </a>

        <a href="https://mind.roachfamily.net" class="card">
            <div class="icon">🧠</div>
            <h2>Mind</h2>
            <p>Affine</p>
        </a>

    </section>

    <footer>
        <p id="status">System status: Checking...</p>
    </footer>
</main>

<script src="script.js"></script>
</body>
</html>
